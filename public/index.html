<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="theme-color" content="#000000" />
    <link rel="apple-touch-icon" href="/icon.png" />
    <title>Yuwol</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      
      /* 1. 껍데기(body)는 화면에 완전 고정: 여기서 바운스와 전체 화면 흔들림을 원천 차단해. */
      html, body {
        width: 100%;
        height: 100%; /* dvh 대신 100% 사용 */
        background: #000;
        overflow: hidden; /* 화면 전체가 스크롤되는 것 방지 */
        overscroll-behavior: none; /* 고무줄 바운스 효과 제거 */
        -webkit-tap-highlight-color: transparent;
      }

      /* 2. 알맹이(root)는 사방으로 꽉 채우고, 길어질 때만 내부 스크롤 허용! */
      #root {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0; /* 100dvh 버그 우회: 화면 끝부터 끝까지 핀셋으로 찝듯 고정 */
        
        overflow-y: auto; /* 내용이 길면 이 안에서만 부드럽게 스크롤됨 */
        -webkit-overflow-scrolling: touch; /* 아이폰 특유의 부드러운 가속 스크롤 지원 */
        overscroll-behavior-y: contain; /* 안에서 스크롤 끝까지 내려도 바깥 화면이 들썩이지 않게 막음 */
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
