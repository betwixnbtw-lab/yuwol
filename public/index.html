<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />

    <!-- Android / Browser -->
    <meta name="theme-color" content="#000000" />

    <!-- Viewport -->
    <meta
      name="viewport"
      content="
        width=device-width,
        initial-scale=1,
        maximum-scale=1,
        user-scalable=no,
        viewport-fit=cover
      "
    />

    <link rel="apple-touch-icon" href="/icon.png" />

    <title>Yuwol</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }

      html {
        width: 100%;
        height: 100%;
        background: #000;
        overflow: hidden;
      }

      body {
        width: 100%;
        min-height: 100vh;
        min-height: 100dvh;

        background:
          radial-gradient(
            circle at top,
            rgba(130, 100, 255, 0.22),
            transparent 45%
          ),
          radial-gradient(
            circle at bottom left,
            rgba(0, 255, 170, 0.12),
            transparent 35%
          ),
          #000;

        overflow: hidden;

        overscroll-behavior: none;
        -webkit-overflow-scrolling: touch;

        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
      }

      #root {
        width: 100%;
        min-height: 100vh;
        min-height: 100dvh;
      }

      /* iOS input zoom 방지 */
      input,
      textarea,
      select,
      button {
        font-size: 16px;
      }

      /* 드래그/롱터치 방지 */
      img,
      button,
      a {
        -webkit-user-drag: none;
        user-select: none;
      }
    </style>
  </head>

  <body>
    <div id="root"></div>

    <script>
      // iOS 바운스 스크롤 방지
      document.addEventListener(
        "touchmove",
        function (e) {
          if (e.scale !== 1) {
            e.preventDefault();
          }
        },
        { passive: false }
      );
    </script>
  </body>
</html>
