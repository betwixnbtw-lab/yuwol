<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    
    <meta name="theme-color" content="#030b08" />
    <link rel="apple-touch-icon" href="/icon.png" />
    <title>Yuwol</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      * { 
        margin: 0; 
        padding: 0; 
        box-sizing: border-box; 
        -webkit-tap-highlight-color: transparent; 
      }
      
      html, body, #root {
        width: 100%;
        height: 100%;
        height: 100dvh;
        
        /* 4. 핵심 속임수: body 전체 배경을 생블랙(#000)이 아니라 하단으로 갈수록 자연스럽게 딥그린/보라가 섞이게 베이스를 깜. 
           이렇게 하면 시스템이 강제로 영역을 늘려도 검은색 선이 안 생김 */
        background: linear-gradient(to bottom, #000000 60%, #030b08 85%, #05040a 100%) !important;
        
        overflow: hidden;
        overscroll-behavior: none; 
        overscroll-behavior-y: none;
        
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script>
      // 스크롤 바운스 강제 잠금
      document.addEventListener('touchmove', function(e) {
        e.preventDefault();
      }, { passive: false });
    </script>
  </body>
</html>
